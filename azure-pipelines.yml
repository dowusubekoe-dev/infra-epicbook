trigger:
  branches:
    include:
      - main

pool:
  name: 'epicbook-deploy-agent'

variables:
  - group: deploy-epicbook-secrets
  - name: terraformVersion
    value: '1.8.5'
  - name: azureServiceConnection
    value: 'azure-devops-epicbook-spn'

steps:
  - checkout: self
    displayName: 'Checkout repository'

  - script: |
      sudo rm -f /usr/local/bin/az
      printf '#!/usr/bin/env bash\nAZ_INSTALLER=DEB /opt/az/bin/python3 -Im azure.cli "$@"\n' | sudo tee /usr/local/bin/az
      sudo chmod +x /usr/local/bin/az
      az --version
    displayName: 'Fix Azure CLI PATH'

  - task: DownloadSecureFile@1
    name: sshPublicKey
    displayName: 'Download SSH public key'
    inputs:
      secureFile: 'id_ed25519.pub'

  - script: |
      sudo apt-get update
      sudo apt-get install -y unzip curl
    displayName: 'Install required packages'

  - script: |
      set -e
      echo "Installing Terraform $(terraformVersion)..."
      curl -Lo terraform.zip https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip
      unzip -o terraform.zip
      sudo mv terraform /usr/local/bin/
      terraform version
    displayName: 'Install Terraform'

  - script: |
      mkdir -p ~/.ssh
      cp "$(sshPublicKey.secureFilePath)" ~/.ssh/id_ed25519.pub
      chmod 644 ~/.ssh/id_ed25519.pub
      ls -l ~/.ssh
    displayName: 'Prepare SSH Public Key'

  - task: AzureCLI@2
    displayName: 'Terraform Init'
    inputs:
      azureSubscription: '$(azureServiceConnection)'
      addSpnToEnvironment: true
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -e
        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_CLIENT_SECRET="$servicePrincipalKey"
        export ARM_TENANT_ID="$tenantId"
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
        export TF_VAR_db_password="$(db_password)"

        terraform -chdir="$(Build.SourcesDirectory)" init -reconfigure

  - task: AzureCLI@2
    displayName: 'Terraform Plan'
    inputs:
      azureSubscription: '$(azureServiceConnection)'
      addSpnToEnvironment: true
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -e
        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_CLIENT_SECRET="$servicePrincipalKey"
        export ARM_TENANT_ID="$tenantId"
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
        export TF_VAR_db_password="$(db_password)"
        export TF_VAR_public_key="$(sshPublicKey.secureFilePath)"

        terraform -chdir="$(Build.SourcesDirectory)" plan -var-file="$(Build.SourcesDirectory)/terraform.tfvars" -out=tfplan

  - task: AzureCLI@2
    displayName: 'Terraform Apply'
    inputs:
      azureSubscription: '$(azureServiceConnection)'
      addSpnToEnvironment: true
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -e
        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_CLIENT_SECRET="$servicePrincipalKey"
        export ARM_TENANT_ID="$tenantId"
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
        export TF_VAR_db_password="$(db_password)"
        export TF_VAR_public_key="$(sshPublicKey.secureFilePath)"

        terraform -chdir="$(Build.SourcesDirectory)" apply -auto-approve -var-file="$(Build.SourcesDirectory)/terraform.tfvars" tfplan

  - task: AzureCLI@2
    displayName: 'Write Terraform outputs to artifact file'
    inputs:
      azureSubscription: '$(azureServiceConnection)'
      addSpnToEnvironment: true
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -e
        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_CLIENT_SECRET="$servicePrincipalKey"
        export ARM_TENANT_ID="$tenantId"
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
        export TF_VAR_db_password="$(db_password)"

        PUBLIC_IP=$(terraform -chdir="$(Build.SourcesDirectory)" output -raw public_ip)
        DB_HOST=$(terraform -chdir="$(Build.SourcesDirectory)" output -raw db_host)

        mkdir -p "$(Build.ArtifactStagingDirectory)"

        cat > "$(Build.ArtifactStagingDirectory)/infra-outputs.env" <<EOF
        vmPublicIp=$PUBLIC_IP
        db_host=$DB_HOST
        EOF

        echo "Generated infra-outputs.env:"
        cat "$(Build.ArtifactStagingDirectory)/infra-outputs.env"

  - publish: $(Build.ArtifactStagingDirectory)/infra-outputs.env
    artifact: infra-outputs
    displayName: 'Publish infra outputs artifact'

  - script: |
      echo "Terraform deployment completed."
    displayName: 'Finish Infra Pipeline'