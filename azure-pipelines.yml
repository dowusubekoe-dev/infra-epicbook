trigger:
  branches:
    include:
      - main

pool:
  name: 'epicbook-deploy-agent'

variables:
  - group: epicbook-secrets
  - name: TF_VAR_db_password
    value: '$(db_password)'
  - name: TF_VAR_db_name
    value: '$(db_name)'
  - name: TF_VAR_db_zone
    value: '$(db_zone)'
  - name: terraformVersion
    value: '1.8.5'
  - name: TF_VAR_ssh_public_key
    value: '$(sshPublicKey.secureFilePath)'
  - name: azureServiceConnection
    value: 'epicbook-devops-sb'

steps:
  - checkout: self
    displayName: 'Checkout repository'


  - task: DownloadSecureFile@1
    name: sshPublicKey
    displayName: 'Download SSH public key'
    inputs:
      secureFile: 'azure_vm_key.pub'

  - script: |
      sudo apt-get update
      sudo apt-get install -y unzip curl
    displayName: 'Install required packages'

  - script: |
      set -e
      echo "Installing Terraform $(terraformVersion)..."
      curl -Lo terraform.zip https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip
      unzip -o terraform.zip
      sudo mv terraform /usr/local/bin/
      terraform version
    displayName: 'Install Terraform'

  - script: |
      mkdir -p ~/.ssh
      cp "$(sshPublicKey.secureFilePath)" ~/.ssh/azure_vm_key.pub
      chmod 644 ~/.ssh/azure_vm_key.pub
      ls -l ~/.ssh
    displayName: 'Prepare SSH Public Key'

  - task: AzureCLI@2
    displayName: 'Terraform Init'
    inputs:
      azureSubscription: '$(azureServiceConnection)'
      addSpnToEnvironment: true
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -e
        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_CLIENT_SECRET="$servicePrincipalKey"
        export ARM_TENANT_ID="$tenantId"
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
        export ARM_USE_AZUREAD=true
        export TF_VAR_db_password="$(db_password)"
        export TF_VAR_db_name="$(db_name)"
        export TF_VAR_db_zone="$(db_zone)"
        export TF_VAR_ssh_public_key="$(cat $(sshPublicKey.secureFilePath))"

        terraform -chdir="$(Build.SourcesDirectory)" init -reconfigure

  - task: AzureCLI@2
    displayName: 'Terraform Validate'
    inputs:
      azureSubscription: '$(azureServiceConnection)'
      addSpnToEnvironment: true
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -e
        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_CLIENT_SECRET="$servicePrincipalKey"
        export ARM_TENANT_ID="$tenantId"
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
        export ARM_USE_AZUREAD=true
        export TF_VAR_db_password="$(db_password)"
        export TF_VAR_db_name="$(db_name)"
        export TF_VAR_db_zone="$(db_zone)"
        export TF_VAR_ssh_public_key="$(cat $(sshPublicKey.secureFilePath))"

        terraform -chdir="$(Build.SourcesDirectory)" validate

  - script: |
      terraform -chdir="$(Build.SourcesDirectory)" fmt -check
      terraform -chdir="$(Build.SourcesDirectory)" validate
    displayName: 'Terraform Validate'

  - task: AzureCLI@2
    displayName: 'Terraform Plan'
    inputs:
      azureSubscription: '$(azureServiceConnection)'
      addSpnToEnvironment: true
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -e
        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_CLIENT_SECRET="$servicePrincipalKey"
        export ARM_TENANT_ID="$tenantId"
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
        export ARM_USE_AZUREAD=true
        export TF_VAR_db_password="$(db_password)"
        export TF_VAR_db_name="$(db_name)"
        export TF_VAR_db_zone="$(db_zone)"
        export TF_VAR_ssh_public_key="$(cat $(sshPublicKey.secureFilePath))"

        terraform -chdir="$(Build.SourcesDirectory)" plan -out=tfplan

  - task: AzureCLI@2
    displayName: 'Terraform Apply'
    inputs:
      azureSubscription: '$(azureServiceConnection)'
      addSpnToEnvironment: true
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -e
        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_CLIENT_SECRET="$servicePrincipalKey"
        export ARM_TENANT_ID="$tenantId"
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
        export ARM_USE_AZUREAD=true
        export TF_VAR_db_password="$(db_password)"
        export TF_VAR_db_name="$(db_name)"
        export TF_VAR_db_zone="$(db_zone)"
        export TF_VAR_ssh_public_key="$(cat $(sshPublicKey.secureFilePath))"

        terraform -chdir="$(Build.SourcesDirectory)" apply -auto-approve tfplan

  - task: AzureCLI@2
    displayName: 'Write Terraform outputs to artifact file'
    inputs:
      azureSubscription: '$(azureServiceConnection)'
      addSpnToEnvironment: true
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -e
        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_CLIENT_SECRET="$servicePrincipalKey"
        export ARM_TENANT_ID="$tenantId"
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
        export ARM_USE_AZUREAD=true
        export TF_VAR_db_password="$(db_password)"
        export TF_VAR_db_name="$(db_name)"
        export TF_VAR_db_zone="$(db_zone)"
        export TF_VAR_ssh_public_key="$(cat $(sshPublicKey.secureFilePath))"

        PUBLIC_IP=$(terraform -chdir="$(Build.SourcesDirectory)" output -raw app_public_ip 2>/dev/null || echo "")
        DB_HOST=$(terraform -chdir="$(Build.SourcesDirectory)" output -raw db_host 2>/dev/null || echo "")

        mkdir -p "$(Build.ArtifactStagingDirectory)"

        cat > "$(Build.ArtifactStagingDirectory)/infra-outputs.env" <<EOF
        vmPublicIp=$PUBLIC_IP
        db_host=$DB_HOST
        EOF

        echo "Generated infra-outputs.env:"
        cat "$(Build.ArtifactStagingDirectory)/infra-outputs.env"

  - publish: $(Build.ArtifactStagingDirectory)/infra-outputs.env
    artifact: infra-outputs
    displayName: 'Publish infra outputs artifact'

  - script: |
      echo "Terraform deployment completed."
    displayName: 'Finish Infra Pipeline'